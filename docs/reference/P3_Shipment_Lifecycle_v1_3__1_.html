<title>P3 Shipment Lifecycle v1.3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  .header-info { font-size: 12px; color: #a0aec0; margin-top: 2px; }
  .header-info .code { color: #fbd38d; font-weight: 600; }
  .header-info .corrections { color: #fc8181; }
  .phase-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .phase-tag { font-size: 9px; padding: 2px 8px; border-radius: 4px; }

  .timeline { display: flex; gap: 3px; min-width: fit-content; }
  .timeline-btn { border: 1px solid #2d3748; background: #1a1f2e; border-radius: 6px; padding: 6px 8px; cursor: pointer; min-width: 62px; display: flex; flex-direction: column; align-items: center; gap: 1px; position: relative; transition: all 0.15s; }

  .timeline-btn.active { border-width: 2px; }
  .timeline-btn .icon { font-size: 16px; }
  .timeline-btn .num { font-size: 9px; font-weight: 700; }
  .timeline-btn .label { font-size: 8px; line-height: 1.1; text-align: center; max-width: 58px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .correction-dot { position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; border-radius: 50%; background: #fc8181; }

  .progress-bar { margin: 10px 20px 0; height: 3px; background: #2d3748; border-radius: 2px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }

  .main { padding: 16px 20px; max-width: 920px; margin: 0 auto; }

  .correction-banner { background: rgba(252,129,129,0.13); border: 1px solid rgba(252,129,129,0.33); border-radius: 8px; padding: 8px 14px; margin-bottom: 12px; font-size: 11px; color: #fc8181; display: flex; align-items: center; gap: 8px; }

  .step-name { font-size: 18px; font-weight: 700; }
  .step-phase-tag { font-size: 10px; padding: 1px 8px; border-radius: 4px; font-weight: 600; }
  .step-en { font-size: 12px; color: #a0aec0; }
  .step-meta { display: flex; gap: 14px; flex-wrap: wrap; }
  .step-meta-item { text-align: center; }
  .step-meta-label { font-size: 9px; color: #718096; text-transform: uppercase; letter-spacing: 1px; }
  .step-meta-val { font-size: 12px; font-weight: 600; color: #f7fafc; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .step-meta-val.kanban { color: #fbd38d; }
  .step-body { padding: 12px 18px; }
  .step-desc { font-size: 12px; color: #cbd5e0; line-height: 1.55; }
  .step-platform { font-size: 11px; color: #a0aec0; margin-top: 6px; }

  .field-en { color: #a0aec0; }
  .field-example { padding: 1px 6px; border-radius: 3px; font-family: monospace; font-size: 11px; }
  .field-rule { font-size: 11px; }

  .extra-total span:last-child { font-weight: 700; color: #fbd38d; font-family: monospace; }

  .tenk-box { margin-top: 8px; padding: 6px 10px; border-radius: 5px; font-size: 11px; }

  .doc-grid { padding: 10px 18px; display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 6px; }
  .doc-item { background: #252d3d; border-radius: 5px; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; }
  .doc-item span:first-child { font-size: 11px; color: #e2e8f0; }

  .qdoc-name { font-size: 12px; color: #e2e8f0; font-weight: 500; }
  .qdoc-en { font-size: 10px; color: #718096; }

  .note-box { background: #252d3d; border-radius: 6px; padding: 10px 14px; border-left: 3px solid; font-size: 11px; color: #a0aec0; line-height: 1.5; margin-bottom: 16px; }
  .note-box b { font-weight: 700; color: #fbd38d; }

  .nav { display: flex; justify-content: space-between; align-items: center; }
  .nav-btn { border-radius: 6px; padding: 8px 16px; font-size: 12px; cursor: pointer; border: none; }
  .nav-btn:disabled { cursor: default; }
  .nav-btn.prev { background: #1a1f2e; color: #e2e8f0; border: 1px solid #2d3748; }
  .nav-btn.prev:disabled { background: #2d3748; color: #4a5568; }
  .nav-btn.next { color: #fff; font-weight: 600; }
  .nav-btn.next:disabled { background: #2d3748; color: #4a5568; }
  .nav-counter { font-size: 11px; color: #718096; }

  .stats-label { font-size: 11px; color: #718096; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .stats-bar { display: flex; gap: 2px; margin-bottom: 6px; }
  .stats-seg { height: 16px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; transition: background 0.2s; }
  .stats-row { display: flex; justify-content: space-between; font-size: 11px; flex-wrap: wrap; gap: 8px; color: #a0aec0; }

</head>

let activeStep = 0;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const step = ALL_STEPS[activeStep];
  const ph = PHASE_COLORS[step.phase] || {bg:"#edf2f7",text:"#4a5568"};
  const isCorr = (step.description||'').includes('CORRECTED') || (step.description||'').includes('CORRECTION') || (step.description||'').includes('v1.3 UPDATED');
  const isNew = (step.role||'').includes('NEW in v1.2') || (step.role||'').includes('NEW in v1.3');
  const totalFields = ALL_STEPS.reduce((s,st)=>s+st.fields.length,0);
  const filledFields = ALL_STEPS.slice(0,activeStep+1).reduce((s,st)=>s+st.fields.length,0);
  const totalRoles = new Set(ALL_STEPS.map(s=>s.who)).size;
  const filledRoles = new Set(ALL_STEPS.slice(0,activeStep+1).map(s=>s.who)).size;

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-sub">P3 Export Module</div>
        <h1>Shipment Lifecycle v1.3 — One Record View</h1>
        <div class="header-info">Tracking <span class="code">02FB005/26</span> · <span class="corrections">v1.3: post-TZ Excel analysis + domain corrections</span> · ${ALL_STEPS.length} steps · 12 docs per truck · 8 countries · 1,959 shipments/season</div>
      </div>
      <div class="phase-tags">
        ${Object.entries(PHASE_COLORS).map(([n,c])=>`<span class="phase-tag" style="background:${c.bg}33;color:${c.text};border:1px solid ${c.text}44">${n}</span>`).join('')}
      </div>
    </div>
  </div>

  <div class="timeline-wrap">
    <div class="timeline">
      ${ALL_STEPS.map((s,i)=>{
        const p=PHASE_COLORS[s.phase]||{bg:"#edf2f7",text:"#4a5568"};
        const act=activeStep===i;
        const hasDot=(s.description||'').includes('CORRECTED')||(s.role||'').includes('NEW');
        return `<button class="timeline-btn${act?' active':''}" onclick="goStep(${i})" style="${act?`border-color:${p.text};background:${p.bg}22;color:${p.text}`:`color:#718096`}">
          ${hasDot?'<div class="correction-dot"></div>':''}
          <span class="icon">${s.icon}</span>
          <span class="num">${s.num}</span>
          <span class="label">${esc(s.name_tk)}</span>
        </button>`;
      }).join('')}
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" style="width:${(activeStep/(ALL_STEPS.length-1))*100}%;background:linear-gradient(90deg,${ph.text},${ph.bg})"></div></div>

  <div class="main">`;

  // Correction/New banner
  if(isCorr||isNew) {
    html+=`<div class="correction-banner"><span style="font-size:16px">⚠️</span><span>${isNew?'NEW in v1.2 — This step was not in v1.1':isCorr&&(step.description||'').includes('v1.3')?'UPDATED in v1.3 — Contains corrections from post-TZ Excel analysis (1,959 shipments, 111 import firms, 24 export firms)':'CORRECTED in v1.2 — Contains factual corrections from field research'}</span></div>`;
  }

  // Step card
  html+=`<div class="step-card" style="border:1px solid ${ph.text}55">
    <div class="step-header" style="background:${ph.text}22">
      <div class="step-title-row">
        <div class="step-icon">${step.icon}</div>
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="step-name" style="color:${ph.bg}">Step ${step.num}: ${esc(step.name_tk)}</span>
            <span class="step-phase-tag" style="background:${ph.bg}33;color:${ph.text}">${step.phase}</span>
          </div>
          <div class="step-en">${esc(step.name_en)}</div>
        </div>
      </div>
      <div class="step-meta">
        <div class="step-meta-item"><div class="step-meta-label">Who</div><div class="step-meta-val">${esc(step.who)}</div></div>
        <div class="step-meta-item"><div class="step-meta-label">Role</div><div class="step-meta-val">${esc((step.role||'').split('—')[0].trim())}</div></div>
        <div class="step-meta-item"><div class="step-meta-label">Kanban</div><div class="step-meta-val kanban">${esc(step.kanban)}</div></div>
      </div>
    </div>
    <div class="step-body" style="border-top:1px solid ${ph.text}33">
      <div class="step-desc">${esc(step.description)}</div>
      <div class="step-platform"><b style="color:${ph.bg}">Platform:</b> ${esc(step.platform)}</div>
    </div>
  </div>`;

  // Fields table
  html+=`<div class="fields-card">
    <div class="fields-header"><span>Fields at This Step</span><span class="fields-count">${step.fields.length}</span></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Row</th><th>Field (TK)</th><th>English</th><th>Example</th><th>Rule / Note</th></tr></thead>
      <tbody>
        ${step.fields.map(f=>{
          const isV12=f.rule.includes('v1.2');
          return `<tr${isV12?' class="v12-row"':''}>
            <td class="row-ref">${esc(f.row)}</td>
            <td class="field-name">${esc(f.name)}</td>
            <td class="field-en">${esc(f.en)}</td>
            <td><span class="field-example" style="background:${ph.text}33;color:${ph.bg}">${esc(f.example)}</span></td>
            <td class="field-rule${isV12?' v12':''}" style="color:${isV12?'#fc8181':'#718096'}">${esc(f.rule)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`;

  // Block sources
  if(step.blockSource) {
    html+=`<div class="extra-card" style="border:1px solid #276749">
      <div class="extra-header" style="border-bottom:1px solid #27674955;color:#c6f6d5">BARLAG — Block Source Breakdown</div>
      <div class="extra-body">
        ${step.blockSource.map(b=>`<div class="extra-row"><span style="color:#e2e8f0;font-weight:500">${esc(b.block)}</span><span style="color:#c6f6d5;font-family:monospace">${esc(b.kg)} kg</span></div>`).join('')}
        <div class="extra-total" style="border-color:#276749"><span>TOTAL</span><span>18,403 kg</span></div>
      </div>
    </div>`;
  }

  // Firm split
  if(step.firmSplit) {
    html+=`<div class="extra-card" style="border:1px solid #553c9a">
      <div class="extra-header" style="border-bottom:1px solid #553c9a55;color:#e9d8fd">Export Firm Split</div>
      <div class="extra-body">
        ${step.firmSplit.map(f=>`<div class="extra-row"><span style="color:#e2e8f0;font-weight:500">${esc(f.firm)}</span><div style="display:flex;gap:16px"><span style="color:#a0aec0;font-family:monospace">${esc(f.kg)} kg</span><span style="color:#c6f6d5;font-family:monospace;font-weight:600">${esc(f.usd)}</span></div></div>`).join('')}
        <div class="tenk-box" style="background:#553c9a22;color:#e9d8fd">Defaults: Russia = 2 firms (cash only) | Kazakhstan = 1 firm | Own export only</div>
      </div>
    </div>`;
  }

  // Customs docs
  if(step.documents) {
    html+=`<div class="extra-card" style="border:1px solid #2b6cb0">
      <div class="extra-header" style="border-bottom:1px solid #2b6cb055;color:#bee3f8">8 Customs Documents + Electronic Docs to Depo (Shohrat + Shirin + Sulgun + Aynur)</div>
      <div class="doc-grid">
        ${step.documents.map(d=>`<div class="doc-item"><span>${esc(d)}</span><span>✅</span></div>`).join('')}
      </div>
    </div>`;
  }

  // Quality docs
  if(step.qualityDocs) {
    html+=`<div class="extra-card" style="border:1px solid #276749">
      <div class="extra-header" style="border-bottom:1px solid #27674955;color:#c6f6d5">
        <span>4 Quality Documents (Hil Barlagçy) — NEW in v1.2</span>
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#fc818133;color:#fc8181">Was missing in v1.1</span>
      </div>
      <div class="extra-body">
        ${step.qualityDocs.map(d=>`<div class="qdoc-row"><div><div class="qdoc-name">${esc(d.name)}</div><div class="qdoc-en">${esc(d.en)}</div></div><span style="font-size:14px">✅</span></div>`).join('')}
      </div>
    </div>`;
  }

  // Managers
  if(step.managers) {
    html+=`<div class="extra-card" style="border:1px solid #553c9a">
      <div class="extra-header" style="border-bottom:1px solid #553c9a55;color:#e9d8fd">7 Block Managers — Hepdelik Planlama</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Manager</th><th>Phone</th><th>Blocks</th></tr></thead>
        <tbody>
          ${step.managers.map(m=>`<tr${m.name==='(Unknown)'?' class="mgr-unknown"':''}>
            <td style="color:${m.name==='(Unknown)'?'#fc8181':'#e2e8f0'};font-weight:500">${esc(m.name)}</td>
            <td style="color:#a0aec0;font-family:monospace;font-size:11px">${esc(m.phone)}</td>
            <td style="color:#fbd38d;font-weight:500">${esc(m.blocks)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
  }

  // Note
  html+=`<div class="note-box" style="border-left-color:${ph.text}"><b>Note:</b> ${esc(step.note)}</div>`;

  // Nav
  html+=`<div class="nav">
    <button class="nav-btn prev" onclick="goStep(${activeStep-1})" ${activeStep===0?'disabled':''}>← Prev</button>
    <span class="nav-counter">${activeStep+1} / ${ALL_STEPS.length}</span>
    <button class="nav-btn next" onclick="goStep(${activeStep+1})" style="background:${activeStep===ALL_STEPS.length-1?'#2d3748':ph.text}" ${activeStep===ALL_STEPS.length-1?'disabled':''}>Next →</button>
  </div>`;

  // Stats
  html+=`<div class="stats-card">
    <div class="stats-label">Record Progress</div>
    <div class="stats-bar">
      ${ALL_STEPS.map((s,i)=>{
        const p2=PHASE_COLORS[s.phase]||{text:"#718096"};
        const filled=i<=activeStep;
        const fl=Math.max(s.fields.length,1);
        const br=i===0?'3px 0 0 3px':i===ALL_STEPS.length-1?'0 3px 3px 0':'0';
        return `<div class="stats-seg" style="flex:${fl};background:${filled?p2.text:'#2d3748'};border-radius:${br};color:${filled?'#fff':'#4a5568'}">${s.fields.length>1?s.fields.length:''}</div>`;
      }).join('')}
    </div>
    <div class="stats-row">
      <span>Fields: <span class="val">${filledFields}</span> / ${totalFields}</span>
      <span>Roles: <span class="val">${filledRoles}</span> / ${totalRoles}</span>
      <span>Docs: <span class="val">${activeStep>=7?'4 quality':'0'}${activeStep>=8?' + 8 customs + 4 electronic = 16':''}</span></span>
    </div>
  </div>`;

  html+=`</div>`; // main
  document.getElementById('app').innerHTML = html;
}

function goStep(i) {
  if(i<0||i>=ALL_STEPS.length) return;
  activeStep=i;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goStep(activeStep+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') goStep(activeStep-1);
});

render();
</script>
</body>
</html>
