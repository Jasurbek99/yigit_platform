      {row:"—",name:"Töleg statusy",en:"Payment Status",example:"Doly tölenildi",rule:"Full / Partial / Pending"},
    ],
    note:"Closing conditions: (1) Sales report received, (2) Payment confirmed, (3) All timestamps complete, (4) Cash advance reconciled. Quota accounting is updated for the export firm(s) upon closing.",
  },
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Render navigation
const nav = document.getElementById('nav');
nav.innerHTML = STEPS.map((s,i) => 
  `<button class="nav-btn${i===0?' active':''}" onclick="scrollToStep(${i})" id="nav-${i}">${s.icon} ${s.num}</button>`
).join('');

function scrollToStep(i){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+i).classList.add('active');
  document.getElementById('step-'+i).scrollIntoView({behavior:'smooth',block:'start'});
}

// Render all steps
const content = document.getElementById('content');
let html = '';

STEPS.forEach((s,i) => {
  html += `<div class="step-page" id="step-${i}">`;
  
  // Header
  html += `<div class="step-header" style="background:${
    s.phase==='PLANNING'?'#faf5ff':s.phase==='LOADING'?'#f0fdf4':s.phase==='DOCS'?'#eff6ff':s.phase==='TRANSIT'?'#fefce8':s.phase==='DESTINATION'?'#fdf2f8':'#faf5ff'
  }">
    <div>
      <div style="margin-bottom:4px"><span class="phase-label phase-${s.phase}">${s.phase}</span></div>
      <div class="step-title">${s.icon} Step ${s.num}: ${esc(s.name_tk)}</div>
      <div class="step-en">${esc(s.name_en)}</div>
    </div>
    <div class="step-meta">
      <div class="step-meta-item"><div class="step-meta-label">Responsible</div><div class="step-meta-val">${esc(s.who)}</div></div>
      <div class="step-meta-item"><div class="step-meta-label">Role</div><div class="step-meta-val">${esc(s.role)}</div></div>
    </div>
  </div>`;
  
  // Body
  html += `<div class="step-body">`;
  html += `<div class="step-desc">${esc(s.desc)}</div>`;
  html += `<div class="step-platform"><b>Platform feature:</b> ${esc(s.platform)}</div>`;
  
  // Fields table
  if(s.fields.length > 0) {
    html += `<table style="margin-top:10px"><thead><tr><th>Ref</th><th>Field</th><th>English</th><th>Example</th><th>Rule</th></tr></thead><tbody>`;
    s.fields.forEach(f => {
      html += `<tr><td class="mono">${esc(f.row)}</td><td class="field-name">${esc(f.name)}</td><td style="color:#666">${esc(f.en)}</td><td><span class="example-tag">${esc(f.example)}</span></td><td style="color:#888;font-size:11px">${esc(f.rule)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  
  // Block sources
  if(s.blockSource) {
    html += `<div class="extra-section"><div class="extra-title">BARLAG — Block Source Breakdown</div>`;
    s.blockSource.forEach(b => {
      html += `<div class="extra-row"><span>${esc(b.block)}</span><span class="mono">${esc(b.kg)} kg</span></div>`;
    });
    html += `<div class="extra-total"><span>TOTAL</span><span>18 403 kg</span></div></div>`;
  }
  
  // Firm split
  if(s.firmSplit) {
    html += `<div class="extra-section"><div class="extra-title">Export Firm Split</div>`;
    s.firmSplit.forEach(f => {
      html += `<div class="extra-row"><span>${esc(f.firm)}</span><span>${esc(f.kg)} kg · <b>${esc(f.usd)}</b></span></div>`;
    });
    html += `</div>`;
  }
  
  // Customs docs
  if(s.documents) {
    html += `<div class="extra-section"><div class="extra-title">8 Customs & Export Documents</div><div class="doc-grid">`;
    s.documents.forEach(d => {
      html += `<div class="doc-item"><span>${esc(d)}</span><span>✅</span></div>`;
    });
    html += `</div></div>`;
  }
  
  // Quality docs
  if(s.qualityDocs) {
    html += `<div class="extra-section"><div class="extra-title">4 Quality Documents (per greenhouse inspector)</div>`;
    s.qualityDocs.forEach(d => {
      html += `<div class="qdoc-item"><div class="qdoc-name">${esc(d.name)}</div><div class="qdoc-en">${esc(d.en)}</div></div>`;
    });
    html += `</div>`;
  }
  
  // Managers
  if(s.managers) {
    html += `<div class="extra-section"><div class="extra-title">Block Managers</div><table class="mgr-table"><thead><tr><th>Manager</th><th>Phone</th><th>Blocks</th></tr></thead><tbody>`;
    s.managers.forEach(m => {
      const cls = m.name.includes('confirm') ? ' class="mgr-unknown"' : '';
      html += `<tr><td${cls}>${esc(m.name)}</td><td class="mono">${esc(m.phone)}</td><td><b>${esc(m.blocks)}</b></td></tr>`;
    });
    html += `</tbody></table></div>`;
  }
  
  // Note
  html += `<div class="note-box"><b>Note:</b> ${esc(s.note)}</div>`;
  
  html += `</div></div>`; // step-body, step-page
});

content.innerHTML = html;
</script>
</body>
</html>
