server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Django backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket: same backend, but the upgrade handshake needs the Connection
    # + Upgrade headers forwarded. proxy_read_timeout long so an idle WS isn't
    # killed by nginx between heartbeats.
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
